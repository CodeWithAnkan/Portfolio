<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Pure sleek black -->
    <linearGradient id="bgGlow" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b" />   <!-- Zinc 900 -->
      <stop offset="100%" stop-color="#000000" /> <!-- Pure Black -->
    </linearGradient>
    
    <!-- Text Radiant Gradient: Crisp Silver/White -->
    <linearGradient id="textGradient" x1="0" y1="512" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cbd5e1" />    <!-- Slate 300 -->
      <stop offset="100%" stop-color="#ffffff" />  <!-- Pure White -->
    </linearGradient>
  </defs>

  <!-- Dark Rounded Square Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGlow)" />
  
  <!-- Single clean outer ring -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="12" />
  
  <!-- "AC" Monogram -->
  <text 
    x="256" 
    y="340" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="800" 
    font-size="240" 
    fill="url(#textGradient)" 
    text-anchor="middle" 
    letter-spacing="-8"
  >AC</text>
</svg>
